name: Update Major Version
run-name: Update ${{ github.event.inputs.main_version }} to ${{ github.event.inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: The target tag or reference
        required: true
      main_version:
        type: choice
        description: The major version tag to update
        options:
          - v6
          - v7

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        token: ${{ secrets.ACTIONS_BOT_TOKEN }}
        fetch-depth: 0
    - name: Git config
      run: |
        git config user.name actions-bot
        git config user.email actions-bot@users.noreply.github.com
    - name: Tag new target
      env:
        MAIN_VERSION: ${{ github.event.inputs.main_version }}
        TARGET: ${{ github.event.inputs.target }}
      run: git tag -f "$MAIN_VERSION" "$TARGET"
    - name: Push new tag
      env:
        MAIN_VERSION: ${{ github.event.inputs.main_version }}
      run: git push origin "$MAIN_VERSION" --force
