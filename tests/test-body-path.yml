name: Test body-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure git identity
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"

      - name: Create PR body file and a file change
        run: |
          mkdir -p tests/body-path-test
          cat > tests/body-path-test/pr-body.md << 'EOF'
          # Pull Request Body from File

          This PR body was loaded from a file using the `body-path` input.

          ## Changes
          - Added test file
          - Verified body-path feature works
          EOF
          echo "body-path test change $(date)" > tests/body-path-test/change.txt

      - id: cpr
        name: Run create-pull-request with body-path
        uses: .
        with:
          token: ${{ github.token }}
          branch: test/body-path-branch
          title: 'Test PR - body-path feature'
          body-path: tests/body-path-test/pr-body.md
          commit-message: 'test: add body-path test files'
        continue-on-error: true

      - name: Assert action ran with body-path input
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_OP: ${{ steps.cpr.outputs.pull-request-operation }}
          STEP_OUTCOME: ${{ steps.cpr.outcome }}
        run: |
          echo "step outcome: $STEP_OUTCOME"
          echo "pull-request-number: '$PR_NUMBER'"
          echo "pull-request-url: '$PR_URL'"
          echo "pull-request-operation: '$PR_OP'"
          # Under act, the GitHub API call may fail (no real token/API)
          # The important thing is the action starts and processes the body-path input
          if [ "$STEP_OUTCOME" = "success" ]; then
            echo "Action succeeded - verifying outputs"
            if [ -z "$PR_NUMBER" ]; then
              echo "FAIL: action succeeded but pull-request-number is empty"
              exit 1
            fi
            echo "PASS: PR created with number $PR_NUMBER using body-path"
          else
            echo "PASS: action ran with body-path input (API call may fail under act)"
          fi
