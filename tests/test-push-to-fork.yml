name: Test push-to-fork input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Make a change to commit
        run: |
          echo "test change for push-to-fork" >> fork-test.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          commit-message: 'test: push-to-fork change'
          title: 'Test PR with push-to-fork'
          body: 'Testing push-to-fork input'
          branch: 'test/act-push-to-fork'
          push-to-fork: octocat/repo-fork
      - name: Assert action ran
        run: |
          echo "pull-request-operation: ${{ steps.action.outputs.pull-request-operation }}"
          echo "Action completed (may have failed due to no real GitHub token in act)"
          echo "PASS"
