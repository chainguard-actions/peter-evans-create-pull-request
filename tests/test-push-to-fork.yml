name: Test push-to-fork input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Make a change so action has something to commit
        run: |
          echo "test change for push-to-fork test" >> test-push-to-fork.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          branch: test/push-to-fork
          title: 'Test push-to-fork'
          body: 'Testing push-to-fork input'
          commit-message: 'test: push-to-fork'
          push-to-fork: octocat/my-fork
      - name: Assert action ran (push-to-fork input accepted)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action step was skipped"
            exit 1
          fi
          echo "PASS: action accepted push-to-fork input and ran"
