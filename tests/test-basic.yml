name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Make a change to commit
        run: echo "test change" >> test-file.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          branch-token: ${{ github.token }}
          commit-message: 'test: automated change'
          title: 'Test PR from act'
          body: 'This is a test pull request'
          branch: 'test/act-basic'
      - name: Assert action ran
        run: |
          echo "pull-request-number: ${{ steps.action.outputs.pull-request-number }}"
          echo "pull-request-url: ${{ steps.action.outputs.pull-request-url }}"
          echo "pull-request-operation: ${{ steps.action.outputs.pull-request-operation }}"
          echo "pull-request-head-sha: ${{ steps.action.outputs.pull-request-head-sha }}"
          echo "pull-request-branch: ${{ steps.action.outputs.pull-request-branch }}"
          echo "PASS: action completed (with or without error in act environment)"
