name: Test path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up a subdirectory repo for path input
        run: |
          mkdir -p /tmp/subrepo
          cd /tmp/subrepo
          git init
          git config user.email "test@example.com"
          git config user.name "Test User"
          echo "hello" > README.md
          git add .
          git commit -m "initial commit"
          # Make a change so the action has something to commit
          echo "world" >> README.md
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          path: /tmp/subrepo
          branch: test/path-input
          title: 'Test path input'
          body: 'Testing the path input'
          commit-message: 'test: path input'
      - name: Assert action ran (path input accepted)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action may fail due to no real GitHub API, but it must have accepted the path input
          # We just verify the step ran (not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action step was skipped"
            exit 1
          fi
          echo "PASS: action accepted path input and ran"
