name: Test assignees, reviewers, labels, and milestone inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Make a change to commit
        run: |
          echo "test change for reviewers" >> reviewer-test.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          commit-message: 'test: reviewers and labels change'
          title: 'Test PR with reviewers and labels'
          body: 'Testing reviewers, assignees, labels, and milestone inputs'
          branch: 'test/act-reviewers-labels'
          assignees: octocat
          reviewers: octocat
          team-reviewers: my-team
          labels: |
            bug
            enhancement
          milestone: 1
      - name: Assert action ran
        run: |
          echo "pull-request-operation: ${{ steps.action.outputs.pull-request-operation }}"
          echo "Action completed (may have failed due to no real GitHub token in act)"
          echo "PASS"
