name: Test no changes scenario
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: cpr
        uses: .
        with:
          token: ${{ github.token }}
          branch: test/no-changes-branch
          title: 'Test PR - no changes'
          body: 'This is a test PR with no changes'
          commit-message: 'test: no changes commit'
        continue-on-error: true

      - name: Assert no PR was created when there are no changes
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_OPERATION: ${{ steps.cpr.outputs.pull-request-operation }}
        run: |
          echo "pull-request-number: '$PR_NUMBER'"
          echo "pull-request-url: '$PR_URL'"
          echo "pull-request-operation: '$PR_OPERATION'"
          # When there are no changes, no PR should be created
          # The outputs should be empty
          if [ -n "$PR_NUMBER" ]; then
            echo "FAIL: expected no PR number but got: $PR_NUMBER"
            exit 1
          fi
          if [ -n "$PR_URL" ]; then
            echo "FAIL: expected no PR URL but got: $PR_URL"
            exit 1
          fi
          echo "PASS: no PR created as expected when there are no changes"
