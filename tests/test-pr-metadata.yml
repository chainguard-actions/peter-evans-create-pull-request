name: Test PR metadata inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Make a change
        run: echo "test change for metadata" >> test-metadata-file.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          commit-message: 'test: metadata inputs change'
          title: 'Test PR metadata inputs'
          body: 'Testing labels, assignees, reviewers, team-reviewers, milestone inputs'
          branch: 'test/act-pr-metadata'
          labels: |
            bug
            enhancement
          assignees: octocat
          reviewers: octocat
          team-reviewers: my-team
          milestone: 1
      - name: Assert action ran
        run: |
          echo "pull-request-number: ${{ steps.action.outputs.pull-request-number }}"
          echo "pull-request-url: ${{ steps.action.outputs.pull-request-url }}"
          echo "pull-request-operation: ${{ steps.action.outputs.pull-request-operation }}"
          echo "PASS: action completed with labels/assignees/reviewers/team-reviewers/milestone inputs"
