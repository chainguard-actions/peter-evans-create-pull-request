name: Test with file changes
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a test file change
        run: |
          echo "test-$(date +%s)" > tests/test-change-file.txt
          echo "Created test file: tests/test-change-file.txt"

      - id: cpr
        uses: .
        with:
          token: ${{ github.token }}
          branch: test/with-changes-branch
          title: 'Test PR - with changes'
          body: 'This is a test PR with file changes'
          commit-message: 'test: automated change'
          add-paths: tests/test-change-file.txt
        continue-on-error: true

      - name: Assert action ran and produced outputs or handled gracefully
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_OPERATION: ${{ steps.cpr.outputs.pull-request-operation }}
          PR_BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
          OUTCOME: ${{ steps.cpr.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "pull-request-number: '$PR_NUMBER'"
          echo "pull-request-url: '$PR_URL'"
          echo "pull-request-operation: '$PR_OPERATION'"
          echo "pull-request-branch: '$PR_BRANCH'"
          # Under act, the action may fail due to missing GitHub API access
          # but it should at least have run (outcome is 'success' or 'failure', not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"

      - name: Cleanup test file
        if: always()
        run: |
          rm -f tests/test-change-file.txt
          echo "Cleaned up test file"
