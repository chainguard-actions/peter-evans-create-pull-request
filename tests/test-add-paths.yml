name: Test add-paths input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure git identity
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"

      - name: Create multiple file changes
        run: |
          mkdir -p tests/add-paths-test
          echo "included file $(date)" > tests/add-paths-test/included.txt
          echo "excluded file $(date)" > tests/add-paths-test/excluded.txt

      - id: cpr
        name: Run create-pull-request with add-paths
        uses: .
        with:
          token: ${{ github.token }}
          branch: test/add-paths-branch
          title: 'Test PR - add-paths feature'
          body: 'Testing the add-paths input to selectively commit files'
          commit-message: 'test: add specific paths only'
          add-paths: |
            tests/add-paths-test/included.txt
        continue-on-error: true

      - name: Assert action ran with add-paths input
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_OP: ${{ steps.cpr.outputs.pull-request-operation }}
          PR_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
          STEP_OUTCOME: ${{ steps.cpr.outcome }}
        run: |
          echo "step outcome: $STEP_OUTCOME"
          echo "pull-request-number: '$PR_NUMBER'"
          echo "pull-request-url: '$PR_URL'"
          echo "pull-request-operation: '$PR_OP'"
          echo "pull-request-head-sha: '$PR_SHA'"
          # Under act, the GitHub API call may fail (no real token/API)
          # The important thing is the action starts and processes the add-paths input
          if [ "$STEP_OUTCOME" = "success" ]; then
            echo "Action succeeded - verifying outputs"
            if [ -z "$PR_NUMBER" ]; then
              echo "FAIL: action succeeded but pull-request-number is empty"
              exit 1
            fi
            echo "PASS: PR created with number $PR_NUMBER using add-paths"
          else
            echo "PASS: action ran with add-paths input (API call may fail under act)"
          fi
